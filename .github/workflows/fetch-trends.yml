# Pre-fetches raw trend data daily with unrestricted internet access,
# so the Cowork writing session finds a ready inbox when it starts.
name: fetch-trends
on:
  schedule:
    - cron: "15 0 * * *"   # 00:15 UTC = 05:45 IST, before the 06:30 IST writing run
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: engine
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests PyYAML
      - name: Fetch trend data
        run: python -m engine.run fetch
      - name: Refresh performance insights (learn & adapt)
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: python -m engine.run feedback || true
      - name: Commit inbox + insights
        run: |
          git config user.name "content-engine"
          git config user.email "engine@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "Trend inbox $(date -u +%F) [skip ci]"
          git pull --rebase origin main || true
          git push
